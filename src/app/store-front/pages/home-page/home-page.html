<div class="min-h-screen bg-[#060101] overflow-hidden">

  <section class="relative h-[70vh] min-h-120">

    <img

      alt="Hero"
      class="absolute inset-0 w-full h-full object-cover brightness-[0.45] saturate-125 contrast-110"
    />

    <div class="absolute inset-0 bg-linear-to-b from-[#060101]/60 via-[#060101]/50 to-[#060101]"></div>

    <div class="absolute inset-0 bg-linear-to-r from-[#060101]/80 to-transparent"></div>

    <div class="absolute top-8 right-8 select-none 
                font-[Bebas_Neue] text-[9rem] 
                text-red-900/5 leading-none">
      00
    </div>

    <div class="absolute left-8 inset-y-0 flex items-center">
      <div class="w-px h-3/4 bg-linear-to-b from-transparent via-red-900/30 to-transparent"></div>
    </div>

    <div class="absolute bottom-0 left-0 px-8 pb-12 space-y-3">

      <div class="flex items-center gap-3">
        <div class="w-5 h-px bg-red-600/60"></div>
        <span class="font-[Barlow_Condensed] text-[9px] tracking-[0.45em] uppercase text-red-500/70">
          Phantom
        </span>
      </div>

      <h1 class="font-['Libre_Baskerville'] italic text-[clamp(3rem,10vw,5rem)] leading-[0.9] text-white tracking-[-0.01em] drop-shadow-[0_0_15px_rgba(255,252,252,0.437)]">
        Midnight
        <br />
        <span class="font-['Barlow_Condensed'] not-italic text-[0.45em] tracking-[0.3em] text-white/40">
          GRANIZADOS & VAPES
        </span>
      </h1>
    </div>

  </section>

  <!-- BUSCADOR -->
  <section class="px-5 mt-2 relative z-10 max-w-2xl mx-auto">
    <app-product-input />
  </section>

  <!-- CATEGORÍAS -->
  <section class="px-5 pt-2 max-w-2xl mx-auto">
    <app-categories-menu />
  </section>

  <!-- PRODUCTOS -->
  <section class="px-5 pt-5 pb-10">

    <div class="flex items-center gap-4 mb-6 max-w-2xl mx-auto">

      <div class="w-4.5 h-px bg-red-700/20"></div>

      <span class="font-[Barlow_Condensed] text-xs tracking-[0.4em] uppercase text-white/60">
        Productos
      </span>

      <div class="flex-1 h-px bg-linear-to-r from-red-700/20 to-transparent"></div>

    </div>

    <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
      <app-product-card />
      <app-product-card />
    </div>

  </section>

  <section class="pb-10">
    <app-pagination />
  </section>
